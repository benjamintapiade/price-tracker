name: Price Tracker Bot

# Corre automáticamente cada 12 horas (a las 00:00 y 12:00 UTC). Además,
# "workflow_dispatch" te deja correrlo manualmente desde la pestaña
# Actions de GitHub cuando quieras.
#
# OJO sobre lo "on-demand": como el cron mínimo real es de minutos pero
# acá lo pusimos cada 12 h, si le mandas un mensaje al bot y quieres
# respuesta al instante, tendrás que gatillarlo con "Run workflow" (o
# esperar hasta la próxima corrida de las 00:00 / 12:00 UTC). Ver nota
# al final de la conversación sobre cómo tener ambas cosas.
on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch: {}

# Evita que dos corridas escriban historial_precios.json al mismo tiempo:
# si el cron se dispara mientras ya hay una corrida en curso (o si
# apretaste "Run workflow" dos veces seguido), la nueva espera en cola
# en vez de correr en paralelo.
concurrency:
  group: price-tracker-bot
  cancel-in-progress: false

# Necesario para que el workflow pueda subir el historial_precios.json
# actualizado de vuelta al repo.
permissions:
  contents: write

jobs:
  revisar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: Correr el bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_runner.py

      - name: Guardar el historial de precios actualizado
        run: |
          git config user.name "price-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add historial_precios.json
          git diff --staged --quiet || git commit -m "Actualiza historial de precios"
          git pull --rebase origin main
          git push
